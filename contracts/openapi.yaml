                    properties:
                      data:
                        $ref: './schemas/triage_encounter.yaml#/EncounterResponse'
        '409':
          description: 状态冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/encounters/{id}/resume:
    post:
      tags:
        - 就诊
