      summary: 取消就诊（CREATED → CANCELLED）
      description: 仅 CREATED 状态可取消。IN_PROGRESS、WAITING_EXAM、COMPLETED 不允许取消。
      operationId: cancelEncounter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
