              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/triage_encounter.yaml#/EncounterResponse'
        '409':
          description: 状态冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/encounters/{id}/complete:
    post:
      tags:
        - 就诊
      summary: 完成就诊（IN_PROGRESS → COMPLETED）
      description: |
        完成就诊前置条件检查：
        - 病历已确认
        - 存在医生最终诊断
        - 所有检查检验已完成/已审核
        - 处方状态为 CONFIRMED 或 VOIDED（如有）
      operationId: completeEncounter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 完成就诊成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/triage_encounter.yaml#/EncounterResponse'
        '409':
          description: 前置条件不满足（缺少诊断/病历未确认/检查未完成/处方状态异常）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

