openapi: 3.1.0
info:
  title: 智慧云脑诊疗平台 API
  version: 0.1.0
  description: |
    阶段二：基础数据管理（认证 + 科室 + 患者 + 医生 + 药品）
    阶段三：排班与挂号（Phase 5-6）
    阶段四：分诊与就诊（Phase 7-8）

    当前包含接口：
    - 认证模块：login / logout / change-password（3 个）
    - 科室模块：tree / list / create / update（4 个）
    - 患者模块：register / me / detail / update / profile / search（6 个）
    - 医生模块：list / create / update / by-department（4 个）
    - 药品模块：list / detail / by-code / by-category / interaction / contraindications（7 个）
    - 排班模块：create / update / cancel / detail / by-doctor / by-department / available（7 个）
    - 挂号模块：create / cancel / detail / by-patient / by-doctor / pending / all（7 个）
    - 分诊模块：analyze / detail / by-patient（3 个）
    - 就诊模块：start / wait-exam / resume / complete / cancel / diagnoses / detail（12 个）

    契约来源：contracts/30_接口数据与错误契约.md 第11节 + 第12节
servers:
  - url: http://localhost:8080
    description: 本地后端
  - url: http://localhost:4010
    description: Prism API Mock Server
paths:
  # ============================================================
  # 认证接口（阶段一）
  # ============================================================
  /api/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: |
        使用用户名和密码进行身份验证，成功后返回 JWT Access Token。

        安全机制：
        - 密码使用 BCrypt（cost=12）哈希存储和校验
        - 连续 5 次失败锁定账号 15 分钟
        - 按 IP + 用户名维度限流，5 分钟内最多 10 次失败
        - 初始管理员首次登录必须修改密码

        JWT Claims 结构：
        - sub: 用户 ID
        - roles: 角色列表
        - tokenVersion: Token 版本号
        - iat: 签发时间
        - exp: 过期时间（+2 小时）
        - jti: 唯一标识
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/auth.yaml#/LoginRequest'
            examples:
              正常登录:
                value:
                  username: admin
                  password: "Admin@2026"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/auth.yaml#/LoginResponse'
              examples:
                成功响应:
                  value:
                    code: SUCCESS
                    message: 操作成功
                    data:
                      accessToken: "eyJhbGciOiJIUzI1NiJ9..."
                      tokenType: Bearer
                      userId: 1
                      username: admin
                      roles:
                        - ADMIN
                      mustChangePassword: false
                      expiresIn: 7200
                    traceId: "abc-123-def"
                强制改密提示:
                  value:
                    code: SUCCESS
                    message: 操作成功
                    data:
                      accessToken: "eyJhbGciOiJIUzI1NiJ9..."
                      tokenType: Bearer
                      userId: 1
                      username: admin
                      roles:
                        - ADMIN
                      mustChangePassword: true
                      expiresIn: 7200
                    traceId: "abc-123-def"
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                缺少字段:
                  value:
                    code: VALIDATION_FAILED
                    message: "用户名不能为空"
                    data: null
                    traceId: "abc-123-def"
                密码太短:
                  value:
                    code: VALIDATION_FAILED
                    message: "密码长度必须在 8-64 之间"
                    data: null
                    traceId: "abc-123-def"
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                错误凭证:
                  value:
                    code: AUTH_INVALID_CREDENTIALS
                    message: "用户名或密码错误"
                    data: null
                    traceId: "abc-123-def"
                账号锁定:
                  value:
                    code: AUTH_ACCOUNT_LOCKED
                    message: "账号已锁定，10 分钟后重试"
                    data: null
                    traceId: "abc-123-def"
                账号禁用:
                  value:
                    code: AUTH_ACCOUNT_DISABLED
                    message: "账号已禁用"
                    data: null
                    traceId: "abc-123-def"
        '429':
          description: 登录限流
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                限流:
                  value:
                    code: AUTH_LOGIN_RATE_LIMITED
                    message: "登录尝试过于频繁"
                    data: null
                    traceId: "abc-123-def"

  /api/auth/logout:
    post:
      tags:
        - 认证
      summary: 退出登录
      description: |
        清除当前用户的认证状态。

        后端处理：
        - 递增当前用户的 tokenVersion，使所有旧 Token 失效
        - 前端需要清除本地存储的 Token 并跳转到登录页

        认证要求：Bearer Token
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                成功:
                  value:
                    code: SUCCESS
                    message: 操作成功
                    data: null
                    traceId: "abc-123-def"
        '401':
          description: 未认证或 Token 已失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                Token 失效:
                  value:
                    code: AUTH_TOKEN_REVOKED
                    message: "Token 已失效，请重新登录"
                    data: null
                    traceId: "abc-123-def"
                未登录:
                  value:
                    code: AUTH_TOKEN_REVOKED
                    message: "未登录或 Token 已失效"
                    data: null
                    traceId: "abc-123-def"

  /api/auth/change-password:
    post:
      tags:
        - 认证
      summary: 修改密码
      description: |
        修改当前用户的密码。

        业务规则：
        - 必须提供正确的原密码
        - 新密码不能与原密码相同
        - 修改成功后自动清除 mustChangePassword 标记
        - 递增 tokenVersion 使旧 Token 失效，需重新登录

        认证要求：Bearer Token
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/auth.yaml#/ChangePasswordRequest'
            examples:
              正常修改:
                value:
                  oldPassword: "OldPassword123!"
                  newPassword: "NewPassword123!"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                成功:
                  value:
                    code: SUCCESS
                    message: 操作成功
                    data: null
                    traceId: "abc-123-def"
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                新旧密码相同:
                  value:
                    code: VALIDATION_FAILED
                    message: "新密码不能与原密码相同"
                    data: null
                    traceId: "abc-123-def"
        '401':
          description: 认证失败或原密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                原密码错误:
                  value:
                    code: AUTH_INVALID_CREDENTIALS
                    message: "原密码错误"
                    data: null
                    traceId: "abc-123-def"
                未登录:
                  value:
                    code: AUTH_TOKEN_REVOKED
                    message: "未登录或 Token 已失效"
                    data: null
                    traceId: "abc-123-def"

  # ============================================================
  # 科室接口
  # ============================================================
  /api/departments/tree:
    get:
      tags:
        - 科室
      summary: 获取科室树形结构
      operationId: getDepartmentTree
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 科室树
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: './schemas/base_data.yaml#/DepartmentResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/departments:
    get:
      tags:
        - 科室
      summary: 获取科室扁平列表
      operationId: getDepartmentList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 科室列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: './schemas/base_data.yaml#/DepartmentResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags:
        - 科室
      summary: 创建科室
      description: 管理员创建科室
      operationId: createDepartment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/DepartmentCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DepartmentResponse'
        '409':
          description: 科室编码重复或父科室不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/departments/{id}:
    get:
      tags:
        - 科室
      summary: 获取科室详情
      operationId: getDepartmentById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 科室详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DepartmentResponse'
        '404':
          description: 科室不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags:
        - 科室
      summary: 更新科室
      description: 管理员更新科室信息
      operationId: updateDepartment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/DepartmentUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DepartmentResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================================
  # 患者接口
  # ============================================================
  /api/patients/register:
    post:
      tags:
        - 患者
      summary: 患者注册
      description: 患者自助注册建档
      operationId: registerPatient
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/PatientRegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientResponse'
        '409':
          description: 用户名或手机号已被使用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/patients/me:
    get:
      tags:
        - 患者
      summary: 获取当前登录患者信息
      operationId: getCurrentPatient
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 患者信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/patients/{id}:
    get:
      tags:
        - 患者
      summary: 获取患者详情
      description: 权限校验：患者只能查看自己的信息
      operationId: getPatientById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 患者详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientResponse'
        '403':
          description: 无权限访问其他患者数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: 患者不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags:
        - 患者
      summary: 更新患者信息
      description: 患者只能更新自己的信息
      operationId: updatePatient
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/PatientUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientResponse'
        '403':
          description: 无权限修改其他患者数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/patients/{id}/profile:
    get:
      tags:
        - 患者
      summary: 获取患者档案
      operationId: getPatientProfile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 患者档案
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientProfileResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags:
        - 患者
      summary: 更新患者档案
      operationId: updatePatientProfile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/PatientProfileUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/PatientProfileResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/patients/search:
    get:
      tags:
        - 患者
      summary: 管理员搜索患者
      description: 按姓名或手机号搜索
      operationId: searchPatients
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: phone
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: './schemas/base_data.yaml#/PatientResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================================
  # 医生接口
  # ============================================================
  /api/doctors:
    get:
      tags:
        - 医生
      summary: 获取医生列表（分页）
      operationId: getDoctorList
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 医生列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags:
        - 医生
      summary: 创建医生
      description: 管理员创建医生账号
      operationId: createDoctor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/DoctorCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DoctorResponse'
        '409':
          description: 父科室停用或用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/doctors/me/profile:
    put:
      tags:
        - 医生
      summary: 更新当前医生个人资料
      operationId: updateCurrentDoctorProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specialty:
                  type: string
                  maxLength: 200
                introduction:
                  type: string
                  maxLength: 2000
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DoctorResponse'
        '403':
          description: 非医生角色无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/doctors/{id}:
    get:
      tags:
        - 医生
      summary: 获取医生详情
      operationId: getDoctorById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 医生详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DoctorResponse'
        '404':
          description: 医生不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags:
        - 医生
      summary: 更新医生信息
      operationId: updateDoctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/base_data.yaml#/DoctorUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: './schemas/base_data.yaml#/DoctorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/doctors/by-department/{deptId}:
    get:
      tags:
        - 医生
      summary: 按科室查询医生
      operationId: getDoctorsByDepartment
      security:
        - bearerAuth: []
      parameters:
        - name: deptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 科室下医生列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: './schemas/base_data.yaml#/DoctorResponse'
        '401':
          description: 未认证
          content:
