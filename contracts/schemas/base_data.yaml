# 基础数据模块 Schema
#
# 对应阶段2：患者、医生、科室和药品字典
# 契约来源：contracts/30_接口数据与错误契约.md

# ============================================================
# 科室
# ============================================================
DepartmentCreateRequest:
  type: object
  required:
    - code
    - name
  properties:
    code:
      type: string
      maxLength: 32
      description: 科室编码
      example: DEPT_CARDIOLOGY
    name:
      type: string
      maxLength: 64
      description: 科室名称
      example: 心血管内科
    parentId:
      type: [integer, 'null']
      description: 父科室 ID，顶级科室为 null
    level:
      type: integer
      description: 科室层级
      example: 2
    sortOrder:
      type: integer
      description: 排序序号
      example: 1
    description:
      type: string
      maxLength: 255
      description: 科室描述

DepartmentUpdateRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      maxLength: 64
      description: 科室名称
    parentId:
      type: [integer, 'null']
    level:
      type: integer
    sortOrder:
      type: integer
    status:
      type: string
      enum: [ENABLED, DISABLED]
      description: 状态
    description:
      type: string

DepartmentResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    code:
      type: string
    name:
      type: string
    parentId:
      type: [integer, 'null']
    level:
      type: integer
    sortOrder:
      type: integer
    status:
      type: string
      enum: [ENABLED, DISABLED]
    description:
      type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    children:
      type: array
      items:
        $ref: '#/DepartmentResponse'

# ============================================================
# 患者
# ============================================================
PatientRegisterRequest:
  type: object
  required:
    - username
    - password
    - name
    - gender
    - birthDate
    - phone
  properties:
    username:
      type: string
      maxLength: 64
      description: 用户名
    password:
      type: string
      minLength: 8
      maxLength: 64
      description: 密码
    name:
      type: string
      maxLength: 64
      description: 患者姓名
    gender:
      type: string
      enum: [MALE, FEMALE]
      description: 性别
    birthDate:
      type: string
      format: date
      description: 出生日期
    phone:
      type: string
      maxLength: 20
      description: 联系电话

PatientUpdateRequest:
  type: object
  required:
    - name
    - gender
    - birthDate
    - phone
  properties:
    name:
      type: string
      maxLength: 64
    gender:
      type: string
      enum: [MALE, FEMALE]
    birthDate:
      type: string
      format: date
    phone:
      type: string
      maxLength: 20

PatientProfileUpdateRequest:
  type: object
  properties:
    address:
      type: string
      maxLength: 255
    emergencyContact:
      type: string
      maxLength: 64
    emergencyPhone:
      type: string
      maxLength: 20
    allergies:
      type: string
      description: 过敏史
    medicalHistory:
      type: string
      description: 既往史

PatientResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    userId:
      type: integer
      format: int64
    name:
      type: string
    gender:
      type: string
      enum: [MALE, FEMALE]
    birthDate:
      type: string
      format: date
    phone:
      type: string
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

PatientProfileResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    patientId:
      type: integer
      format: int64
    address:
      type: string
    emergencyContact:
      type: string
    emergencyPhone:
      type: string
    allergies:
      type: string
    medicalHistory:
      type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

# ============================================================
# 医生
# ============================================================
DoctorCreateRequest:
  type: object
  required:
    - username
    - password
    - departmentId
    - name
    - title
  properties:
    username:
      type: string
      maxLength: 64
    password:
      type: string
      minLength: 8
      maxLength: 64
    departmentId:
      type: integer
      format: int64
    name:
      type: string
      maxLength: 64
    title:
      type: string
      enum: [CHIEF, DEPUTY_CHIEF, ATTENDING, RESIDENT]
      description: 职称
    specialty:
      type: string
      maxLength: 255
    education:
      type: string
      maxLength: 64
    experienceYears:
      type: integer
    introduction:
      type: string

DoctorUpdateRequest:
  type: object
  required:
    - departmentId
    - name
    - title
  properties:
    departmentId:
      type: integer
      format: int64
    name:
      type: string
      maxLength: 64
    title:
      type: string
      enum: [CHIEF, DEPUTY_CHIEF, ATTENDING, RESIDENT]
    specialty:
      type: string
      maxLength: 255
    status:
      type: string
      enum: [ENABLED, DISABLED]
    education:
      type: string
    experienceYears:
      type: integer
    introduction:
      type: string

DoctorResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    userId:
      type: integer
      format: int64
    departmentId:
      type: integer
      format: int64
    departmentName:
      type: string
    name:
      type: string
    title:
      type: string
      enum: [CHIEF, DEPUTY_CHIEF, ATTENDING, RESIDENT]
    specialty:
      type: string
    status:
      type: string
      enum: [ENABLED, DISABLED]
    education:
      type: string
    experienceYears:
      type: integer
    introduction:
      type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

# ============================================================
# 药品
# ============================================================
DrugResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    code:
      type: string
    name:
      type: string
    genericName:
      type: string
    dosageForm:
      type: string
      enum: [TABLET, CAPSULE, INJECTION, SYRUP, OINTMENT]
    strength:
      type: string
    unit:
      type: string
    category:
      type: string
      enum: [WESTERN, CHINESE]
    status:
      type: string
      enum: [ENABLED, DISABLED]
    ingredients:
      type: array
      items:
        type: object
        properties:
          ingredientName:
            type: string
          amount:
            type: string
    dosageRule:
      type: [object, 'null']
      properties:
        minDose:
          type: number
          format: double
        maxDose:
          type: number
          format: double
        maxSingleDose:
          type: number
          format: double
        frequency:
          type: string
          enum: [QD, BID, TID, QID, QN]
    contraindications:
      type: array
      items:
        type: object
        properties:
          conditionType:
            type: string
            enum: [ALLERGY, DISEASE, PREGNANCY, AGE]
          conditionValue:
            type: string
          description:
            type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

DrugInteractionResponse:
  type: object
  properties:
    drugACode:
      type: string
    drugBCode:
      type: string
    severity:
      type: string
      enum: [LOW, MEDIUM, HIGH, CONTRAINDICATED]
    description:
      type: string
