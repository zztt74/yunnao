name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Test and package backend
        working-directory: backend
        run: mvn --batch-mode verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Test frontend
        working-directory: frontend
        run: npm run test
      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  contract-and-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tests/contract/package-lock.json
      - name: Install contract tooling
        working-directory: tests/contract
        run: npm ci
      - name: Validate OpenAPI
        working-directory: tests/contract
        run: npm run validate
      - name: Verify scaffold invariants
        run: node tests/integration/verify-scaffold.mjs
      - name: Verify directory ownership map
        run: node tests/integration/check-ownership.mjs
      - name: Scan high-confidence secret patterns
        run: node tests/integration/scan-secrets.mjs
      - name: Verify collaboration documentation structure
        run: node tests/integration/check-collaboration-docs.mjs
      - name: Validate Compose model
        env:
          MYSQL_PASSWORD: ci-only-password
          MYSQL_ROOT_PASSWORD: ci-only-root-password
        run: docker compose config --quiet
