spring:
  application:
    name: cloud-brain-backend
  config:
    import: optional:classpath:application-ai.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cloud_brain?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:cloud_brain}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      # 时间字段输出 ISO 8601 字符串而非 epoch 数字
      # （30_接口数据与错误契约.md §5、33_错误码与时间规范.md §5）
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

# 日志配置（来自 30_接口数据与错误契约.md 第3节、阶段8 公共基础设施）
# - 控制台输出不带 traceId（保持简洁）
# - 文件输出带 [%X{traceId}]，由 TraceIdFilter 写入 MDC
# - 禁止记录 Spring Security 的敏感调试信息
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.neusoft.cloudbrain: DEBUG
    org.springframework.security: WARN
  file:
    name: ${LOG_FILE:logs/cloud-brain.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200  # Token 有效期（秒），2 小时

# 初始管理员配置
admin:
  init:
    username: ${INITIAL_ADMIN_USERNAME:admin}
    password: ${INITIAL_ADMIN_PASSWORD}

# 安全配置
security:
  max-failed-attempts: 5      # 连续失败锁定阈值
  lockout-minutes: 15         # 锁定时长（分钟）
  rate-limit-window-seconds: 300   # 登录限流窗口（5 分钟）
  rate-limit-max-attempts: 10     # 限流最大失败次数
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
