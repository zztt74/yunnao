# 测试环境配置 - 使用 H2 内存数据库
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

# JWT 测试配置
jwt:
  secret: ThisIsASecretKeyForTestingThatIsAtLeast32BytesLong!!
  expiration: 7200
